name = "faultline"
main = "src/server.ts"
compatibility_date = "2026-03-09"
compatibility_flags = ["nodejs_compat"]

# Workers AI — Llama 3.3 70B on Cloudflare's GPU
[ai]
binding = "AI"

# ChatAgent — per-session chat history + watchlist context
[[durable_objects.bindings]]
name = "ChatAgent"
class_name = "ChatAgent"

# DigestAgent — global email subscriber store (fixed "global" instance)
[[durable_objects.bindings]]
name = "DigestAgent"
class_name = "DigestAgent"

# Migrations — v1 created ChatAgent, v2 adds DigestAgent
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DigestAgent"]

[vars]
NODE_ENV = "production"

# Daily 9am UTC cron — fires scheduled() to send morning digest
[triggers]
crons = ["0 9 * * *"]

# Static assets served via Vite build
[assets]
directory = "./dist/client"
binding = "ASSETS"
